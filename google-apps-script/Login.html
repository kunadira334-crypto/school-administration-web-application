<div id="loginPage" class="login-wrap">
  <div class="login-card">
    <img id="loginLogo" src="" alt="logo" style="display:none;">
    <h1>SIM MI Mambaul Ulum Sumberduren</h1>
    <p class="sub">Yayasan Mambaul Ulum &mdash; Sistem Administrasi Sekolah</p>
    <form id="formLogin">
      <div class="field">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="mis. admin / wali1" required>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;">Masuk</button>
      <p class="error-msg" id="loginError"></p>
    </form>
    <p style="text-align:center;font-size:12px;color:#9ca3af;margin-top:18px;">
      Akun default: admin/admin123 &middot; wali1/wali123
    </p>
  </div>
</div>
